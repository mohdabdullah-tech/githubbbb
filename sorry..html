<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Arial', sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: white;
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 4rem;
        margin-bottom: 10px;
        animation: bounce 2s infinite;
    }

    p {
        font-size: 1.5rem;
        margin-bottom: 20px;
        animation: slideUp 2s ease;
    }

    button {
        padding: 12px 25px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        background-color: white;
        color: #ff6f91;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff6f91;
        color: white;
        transform: scale(1.1);
    }

    /* Animations */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }

    @keyframes slideUp {
        from { transform: translateY(50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>SORRY 😔</h1>
    <p>I didn’t mean to hurt you. Please forgive me.</p>
    <button onclick="showMessage()">Forgive Me?</button>
</div>

<script>
    function showMessage() {
        alert("Thank you for forgiving me ❤️");
    }
</script>

</body>
</html>
